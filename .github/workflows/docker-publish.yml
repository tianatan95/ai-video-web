name: Deploy Runpod Worker to Docker Hub

on:
  # Akan jalan otomatis kalau ada file yang berubah di folder runpod_engine
  push:
    paths:
      - 'runpod_engine/**'
    branches:
      - main
      - master
  # Biar bisa dipencet manual tombol "Run workflow" di GitHub
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./runpod_engine
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/runpod-ai-video:v7
